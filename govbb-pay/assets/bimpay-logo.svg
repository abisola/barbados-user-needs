  </g>

  <!-- Wordmark -->
  <text x="48" y="32" font-family="Figtree, system-ui, -apple-system, sans-serif" font-weight="900" font-size="28" letter-spacing="-1" fill="#0e2b5e">BiM<tspan fill="#22b9d8">Pay</tspan></text>
</svg>
